<script type="text/x-red" data-template-name="klicktipp-webhook-auth">
	<div class="form-row">
		<label for="node-config-input-name"><i class="fa fa-tag"></i> <span>Credential Name</span></label>
		<input type="text" id="node-config-input-name" placeholder="Enter the credential name">
	</div>
	<div class="form-row">
		<label for="node-config-input-authParameterKey">
			<i class="fa fa-key"></i> <span>Parameter Key</span>
			<i
				class="fa fa-info-circle"
				style="margin-left:4px; color:#888; cursor: help;"
				title="Enter the exact body parameter key configured in KlickTipp. Usually: Authorization."
			></i>
		</label>
		<input
			type="text"
			id="node-config-input-authParameterKey"
			placeholder="Authorization"
		>
	</div>
	<div class="form-row">
		<label for="node-config-input-authParameterValue">
			<i class="fa fa-lock"></i> <span>Parameter Value</span>
			<i
				class="fa fa-info-circle"
				style="margin-left:4px; color:#888; cursor: help;"
				title="Paste the webhook token exactly as stored in KlickTipp. Do not add &quot;Bearer&quot;, quotes, or extra spaces."
			></i>
		</label>
		<input
			type="password"
			id="node-config-input-authParameterValue"
			placeholder="Empty"
		>
	</div>
	<div class="form-row" style="margin: 12px 0;">
		<p style="color: #555; background-color: #e6f7ff; padding: 5px 10px; border-left: 3px solid #2196F3; margin: 0;">
			In KlickTipp, create or edit your webhook, set the HTTP method to POST, enable Add static value, and add the same key-value pair as a static POST body parameter. If this is missing, body authentication will fail.
		</p>
	</div>
</script>

<script type="text/x-red" data-help-name="klicktipp-webhook-auth">
	<p>
		Stores the KlickTipp webhook body authentication settings. The parameter key is sent as a
		normal request property, and the parameter value is stored securely as a credential.
	</p>
</script>

<script type="text/javascript">
	RED.nodes.registerType('klicktipp-webhook-auth', {
		category: 'config',
		defaults: {
			name: { value: '' },
			authParameterKey: { value: 'Authorization', required: true },
		},
		credentials: {
			authParameterValue: { type: 'password', required: true },
		},
		label: function () {
			return this.name || 'Authentication';
		},
		oneditprepare: function () {
			var parameterKeyField = $('#node-config-input-authParameterKey');
			if (!parameterKeyField.val()) {
				parameterKeyField.val(this.authParameterKey || 'Authorization');
			}
		},
		oneditsave: function () {
			var credentialNameField = $('#node-config-input-name');
			var currentKey = (credentialNameField.val() || '').trim();
			var parameterKeyField = $('#node-config-input-authParameterKey');
			var authParameterKey = (parameterKeyField.val() || '').trim();

			parameterKeyField.val(authParameterKey || 'Authorization');

			if (currentKey) {
				credentialNameField.val(currentKey);
				return;
			}

			var baseName = 'Authentication';
			var usedNames = {};

			RED.nodes.eachConfig(function (config) {
				if (config.type !== 'klicktipp-webhook-auth' || config.id === this.id) {
					return;
				}

				var existingName = (config.name || '').trim();
				if (existingName) {
					usedNames[existingName] = true;
				}
			}.bind(this));

			if (!usedNames[baseName]) {
				credentialNameField.val(baseName);
				return;
			}

			var suffix = 2;
			while (usedNames[baseName + ' ' + suffix]) {
				suffix += 1;
			}

			credentialNameField.val(baseName + ' ' + suffix);
		},
	});
</script>

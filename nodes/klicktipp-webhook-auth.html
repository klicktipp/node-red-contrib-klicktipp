<script type="text/x-red" data-template-name="klicktipp-webhook-auth">
	<div class="form-row">
		<label for="node-config-input-name"><i class="fa fa-tag"></i> <span>Name</span></label>
		<input type="text" id="node-config-input-name" placeholder="Webhook auth">
	</div>
	<div class="form-row">
		<label for="node-config-input-bodyFieldName"><i class="fa fa-key"></i> <span>Body Field</span></label>
		<input
			type="text"
			id="node-config-input-bodyFieldName"
			placeholder="Authorization"
		>
	</div>
	<div class="form-row">
		<label for="node-config-input-secret"><i class="fa fa-lock"></i> <span>Secret</span></label>
		<input
			type="password"
			id="node-config-input-secret"
			placeholder="Enter the webhook secret"
		>
	</div>
</script>

<script type="text/x-red" data-help-name="klicktipp-webhook-auth">
	<p>
		Stores the KlickTipp webhook body authentication settings. The body field name is sent as a
		normal request property, and the secret is stored securely as a credential.
	</p>
</script>

<script type="text/javascript">
	RED.nodes.registerType('klicktipp-webhook-auth', {
		category: 'config',
		defaults: {
			name: { value: '' },
			bodyFieldName: { value: 'Authorization', required: true },
		},
		credentials: {
			secret: { type: 'password', required: true },
		},
		label: function () {
			return this.name || `Webhook Auth (${this.bodyFieldName || 'Authorization'})`;
		},
	});
</script>
